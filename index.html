<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>İyi ki Doğdun Yağmur 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Parisienne&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(180deg,#fff7fb,#ffe7f2,#ffd8ea);

font-family:'Quicksand',sans-serif;

overflow-x:hidden;

color:#ff4d94;

}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

text-align:center;

}

.card{

background:rgba(255,255,255,.55);

backdrop-filter:blur(18px);

padding:45px;

border-radius:35px;

box-shadow:0 10px 35px rgba(255,105,180,.2);

max-width:700px;

}

h1{

font-size:70px;

font-family:'Parisienne',cursive;

margin-bottom:20px;

}

p{

font-size:22px;

line-height:1.8;

}

button{

margin-top:30px;

padding:15px 35px;

border:none;

border-radius:50px;

background:#ff67a8;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

.hearts{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

pointer-events:none;

overflow:hidden;

z-index:-1;

}

.hearts span{

position:absolute;

font-size:25px;

animation:up 12s linear infinite;

opacity:.7;

}

.hearts span:nth-child(1){left:8%;}
.hearts span:nth-child(2){left:25%;}
.hearts span:nth-child(3){left:45%;}
.hearts span:nth-child(4){left:65%;}
.hearts span:nth-child(5){left:85%;}

@keyframes up{

0%{
transform:translateY(110vh);
}

100%{
transform:translateY(-20vh);
}

}

</style>

</head>

<body>

<div class="hearts">

<span>💖</span>
<span>🌸</span>
<span>🩷</span>
<span>✨</span>
<span>🎀</span>

</div>

<div class="hero">

<div class="card">

<h1>Yağmur 💗</h1>

<p>

Bugün sıradan bir gün değil...

Bugün senin 19. yaş günün. 🎂

Bu küçük sürprizi senin için hazırladım.

Çünkü sen buna değecek kadar güzel kalpli birisin. 🤍

</p>

<button onclick="document.getElementById('mesaj').scrollIntoView({behavior:'smooth'})">

💌 Devam Et

</button>

</div>

</div>

<section id="mesaj">
